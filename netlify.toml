# The @netlify/plugin-nextjs runtime sets the publish directory itself and
# transforms .next into static assets + serverless functions. Do NOT set a
# custom `publish` here — pointing it at .next makes Netlify serve the raw
# build output and conflicts with the plugin (intermittent partial 404s).
[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"
